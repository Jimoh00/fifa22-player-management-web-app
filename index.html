<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifa 22 players</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        
        <div class="links">
            <a href="#" class="nav-link active" id="all-players-btn">All Players</a>
            <a href="#" class="nav-link" id="compare-link">Compare Players</a>
            <a href="#" class="nav-link" id="top-player-btn">Top Players</a>
            <a href="#" class="nav-link" id="hdn-gems">Hidden Gems</a>
        </div>
        
        <div>
            <input type="text" id="search-input" placeholder="search player...">
        </div>
        <button id="filter-btn">Filter </button>
    </header>

    <div id="filter-panel">
        <div class="filter-panel-header">
            <h3>filter by</h3>
            <button id="reset-btn">Reset</button>
        </div>

        <div>
            <h3>nationality</h3>
            <input list="countries" id="nationality-filter" placeholder="Country...">
            <datalist id="countries"></datalist>
        </div>

        <div>
            <h3>club</h3>
            <input list="clubs" id="club-filter" placeholder="clubs...">
            <datalist id="clubs"></datalist>
        </div>

        <div>
            <h3>positions</h3>
            <div id="positions-filter"></div>
        </div>

        <button id="close-btn">Close</button>
    </div>

    <div id="player-container"></div>


    <div class="modal-overlay" id="modal-overlay">
        <div class="player-modal">
            <button id="closePM-btn">Close</button>

            <div class="modal-title">
                <span id="modalPlayerPosition">st, lw, rw</span>
                <h1 id="modalPlayerName">Jude Oyagbachuku Bellingham</h1>
                <div>
                    <p id="modalPlayerClub">Real Madrid</p>
                    <p id="modalPlayerNationality">England</p>
                </div>
            </div>

            <div class="modal-main-stats">
                <div>
                    <p>overall</p>
                    <h1 id="modalOverall">90</h1>
                </div>

                <div>
                    <p>potential</p>
                    <h1 id="modalPotential">90</h1>
                </div>
            </div>

            <div class="modal-other-profile">
                <div>
                    <p>Age</p>
                    <h2 id="modalAge">23</h2>
                </div>

                <div>
                    <p>Height</p>
                    <h2 id="modalHeight"></h2>
                </div>

                <div>
                    <p>Weight</p>
                    <h2 id="modalWeight"></h2>
                </div>

                <div>
                    <p>foot</p>
                    <h2 id="modalFoot"></h2>
                </div>

                <div>
                    <p>Value</p>
                    <h2 id="modalValue"></h2>
                </div>

                <div>
                    <p>Wage</p>
                    <h2 id="modalWage"></h2>
                </div>
            </div>

            <div class="modal-attributes">
                <h2>attributes</h2>
                <div class="attribute-row">
                    <p>pac</p>
                    <div class="progress-bar">
                        <div class="progress" id="paceProgress"></div>
                    </div>
                    <p id="modalPace">98</p>
                </div>
                <div class="attribute-row">
                    <p>sho</p>
                    <div class="progress-bar">
                        <div class="progress" id="shoProgress"></div>
                    </div>
                    <p id="modalSho"></p>
                </div>
                <div class="attribute-row">
                    <p>pas</p>
                    <div class="progress-bar">
                        <div class="progress" id="pasProgress"></div>
                    </div>
                    <p id="modalPas"></p>
                </div>
                <div class="attribute-row">
                    <p>dri</p>
                    <div class="progress-bar">
                        <div class="progress" id="driProgress"></div>
                    </div>
                    <p id="modalDri"></p>
                </div>
                <div class="attribute-row">
                    <p>def</p>
                    <div class="progress-bar">
                        <div class="progress" id="defProgress"></div>
                    </div>
                    <p id="modalDef"></p>
                </div>
                <div class="attribute-row">
                    <p>phy</p>
                    <div class="progress-bar">
                        <div class="progress" id="phyProgress"></div>
                    </div>
                    <p id="modalPhy"></p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
